name: Update Ponjika Data

on:
  schedule:
    # Runs at 00:00 UTC (around 6:00 AM BD/Kolkata time) every day
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/argha5/ponjika-api.git
          git add data/*.json
          git diff --staged --quiet || git commit -m "Auto-update ponjika data [skip ci]"
          git push origin main || echo "Nothing to push"
